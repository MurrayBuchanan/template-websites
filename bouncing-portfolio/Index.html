<html>
    <head>
        <title>Your name</title>

        <link rel="icon" href="titleIcon" type="image/x-icon">
        <link rel="stylesheet" type="text/css" href="style.css">
    </head>

    <body onload="init()">
        <section class="about">
            <h2>Your name</h2>
            <h3>Computer Science, Student at <a href=https://github.com/MurrayBuchanan>University of GitHub</a></h3>

            <p class="caption">Currently based on GitHub, Earth</p>
            <p id="earth_time" class="overline">55.8617&deg; N, -4.2583&deg; E</p>
        </section>

        <div class="bounce">
            <h1>Your <b>Name</b></h1>
        </div>

        <script>
            // Edit these three numbers (month: 1 = January … 12 = December)
            const day = 1;
            const month = 12;
            const year = 1999;

            const MS_PER_DAY = 1000 * 60 * 60 * 24;

            function daysSinceBirth() {
                const today = new Date();
                const dob = new Date(year, month - 1, day);
                return Math.ceil((today - dob) / MS_PER_DAY);
            }

            function init() {
                document.getElementById('earth_time').innerHTML = "Day #" + daysSinceBirth();
            }
        </script>
    </body>
</html>
